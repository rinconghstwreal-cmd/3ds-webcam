name: Build 3DS Webcam

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build project
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-webcam-build
          path: |
            *.3dsx
            *.cia
